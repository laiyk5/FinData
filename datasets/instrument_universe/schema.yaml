dataset: instrument_universe
version: 0.1.0
primary_key:
  - universe_id
  - member_code
  - as_of_date
fields:
  - name: universe_id
    type: string
    required: true
    description: Stable logical universe identifier, such as index:SSE50.
  - name: provider
    type: string
    required: true
    description: Source provider, such as tushare or manual.
  - name: source_id
    type: string
    required: false
    description: Provider-native source identifier, such as 000016.SH.
  - name: member_code
    type: string
    required: true
    description: Tushare member instrument code.
  - name: member_name
    type: string
    required: false
    description: Optional member display name.
  - name: valid_from
    type: string
    required: false
    description: Date from which this membership row is valid, in YYYYMMDD format.
  - name: valid_to
    type: string
    required: false
    description: Date until which this membership row is valid, in YYYYMMDD format; blank means open-ended.
  - name: as_of_date
    type: string
    required: true
    description: Provider snapshot date in YYYYMMDD format.
  - name: weight
    type: decimal
    required: false
    description: Optional provider weight.
  - name: rank
    type: integer
    required: false
    description: Optional rank within the snapshot.
  - name: member_type
    type: string
    required: false
    description: Member type, such as equity.
